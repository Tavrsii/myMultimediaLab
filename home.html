<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Player</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="player">
  <h3>Music Player</h3>

  <!-- Link to my selected audio -->
  <audio id="audio" src="audio\YA YA (Live in Houston) .m4a"></audio>

  <!-- Playback Controls -->
  <div class="controls">
    <button id="backBtn">-10</button>
    <button id="playBtn">Play</button>
    <button id="forwardBtn">+10</button>
  </div>

  <!-- Volume and Mute Controls-->
  <div class="volume-container">
    <button id="muteBtn">Mute</button>
    <input type="range" min="0" max="1" step="0.01" id="volumeSlider">
  </div>

  <!-- Time Display -->
  <div class="time">
    <span id="currentTime">0:00</span> /
    <span id="duration">0:00</span>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
